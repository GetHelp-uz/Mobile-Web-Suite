kind = "slides"
previewPath = "/gethelp-presentation/"
title = "GetHelp.uz Taqdimot"
version = "1.0.0"
id = "artifacts/gethelp-presentation"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
localPort = 24227
name = "web"
paths = ["/gethelp-presentation/"]

[services.development]
run = "pnpm --filter @workspace/gethelp-presentation run dev"

[services.env]
PORT = "24227"
BASE_PATH = "/gethelp-presentation/"

[services.production]
build = ["pnpm", "--filter", "@workspace/gethelp-presentation", "run", "build"]
publicDir = "artifacts/gethelp-presentation/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
